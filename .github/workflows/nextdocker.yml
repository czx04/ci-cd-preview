name: docker-buildci

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs: 
  build:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: |
          docker compose up -d --build
          docker compose ps
      - name: log
        if: always()
        run: docker compose logs
      - name: clean
        if: always()
        run: docker compose down


